version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 1
    groups:
      package-patch-minor:
        update-types: ["patch", "minor"]
      package-major:
        update-types: ["major"]
    commit-message:
      prefix: "chore"
